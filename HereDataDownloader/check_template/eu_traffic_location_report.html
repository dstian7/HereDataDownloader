<html>
<script src="javascript/jquery-3.2.1.min.js" type="text/javascript"></script>
<script>
function get_components_info(details){
    var html = "<tr><td style='background:#F0F8FF;font-weight:900'>folder</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>file name</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>location table version</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>status</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>message</td>";

	var datas = [];
	var data_rowspans = [];

    for (var i in details) {
        detail_info = details[i]
        html += '<tr><td>' + detail_info.folder + '</td>';
        html += '<td>' + detail_info.file_name + '</td>';
        html += '<td>' + detail_info.table_version + '</td>';
        var status_background_color = "#FFFFFF";
	        if (detail_info.status == "warning") {
	            status_background_color = "#FFFF66";
	        }
	        else if(detail_info.status == "error") {
	            status_background_color = "#FF2222";
	        }
	        else if(detail_info.status == "not ready") {
	            status_background_color = "#AAAAAA";
	        }
	    html += '<td style="background-color:' + status_background_color + '">' + detail_info.status + '</td>';
        html += '<td>' + detail_info.message + '</td></tr>';
    }
    return html;
}

$(function(){
    $.getJSON("traffic_location.json", function(json) {
        $("#table_result").html(get_components_info(json.details));
        $("#report_title").text(json.component + " raw data check report");
    });
});

</script>
