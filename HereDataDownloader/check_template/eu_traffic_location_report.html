<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>EU traffic location report</title>
    <link rel="stylesheet" href="javascript/report.css"/>
</head>
<body>
<div class="page">
    <header class="report-header">
        <div>
            <h1 id="report_title">EU traffic location report</h1>
            <div class="report-meta">
                <a class="back-link" href="result_report.html">&larr; Back to main</a>
            </div>
        </div>
    </header>

    <main>
        <div class="toolbar" role="region" aria-label="Report filters">
            <label class="search-box">
                <span class="visually-hidden">Search</span>
                <input type="search" id="searchInput" placeholder="Search folder, file, message&hellip;" autocomplete="off"/>
            </label>
            <div class="filter-chips" role="group" aria-label="Filter by status" id="statusChips"></div>
        </div>

        <div class="row-counter" id="rowCounter" aria-live="polite"></div>

        <section class="table-wrap" aria-label="Traffic location table">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th class="sortable" data-key="folder" tabindex="0">folder <span class="sort-indicator"></span></th>
                        <th class="sortable" data-key="file_name" tabindex="0">file name <span class="sort-indicator"></span></th>
                        <th class="sortable" data-key="table_version" tabindex="0">location table version <span class="sort-indicator"></span></th>
                        <th class="sortable" data-key="statusKey" tabindex="0">status <span class="sort-indicator"></span></th>
                        <th class="sortable" data-key="message" tabindex="0">message <span class="sort-indicator"></span></th>
                    </tr>
                </thead>
                <tbody id="resultBody"></tbody>
            </table>
        </section>
    </main>
</div>

<script src="javascript/jquery-3.2.1.min.js"></script>
<script src="javascript/report-core.js"></script>
<script src="javascript/report-render.js"></script>
<script src="javascript/report-init.js"></script>
<script>
window.ReportApp.start({
    jsonFile: "traffic_location.json",
    columns: [
        {key: "folder", label: "folder"},
        {key: "file_name", label: "file name"},
        {key: "table_version", label: "location table version"},
        {key: "statusKey", label: "status", render: "status"},
        {key: "message", label: "message"}
    ],
    flatten: function(json) {
        return (json.details || []).map(function(d) {
            return {
                folder: d.folder || "",
                file_name: d.file_name || "",
                table_version: d.table_version || "",
                status: d.status || "",
                statusKey: window.ReportApp.statusKey(d.status),
                message: d.message || ""
            };
        });
    },
    setHeader: function(json) {
        var name = json.component || "EU traffic location";
        document.getElementById("report_title").textContent = name + " raw data check report";
    },
    searchKeys: ["folder", "file_name", "table_version", "status", "message"]
});
</script>
</body>
</html>
