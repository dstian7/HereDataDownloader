<html>
<script src="javascript/jquery-3.2.1.min.js" type="text/javascript"></script>
<script>
function get_components_info(components){
    var html = "<tr><td style='background:#F0F8FF;font-weight:900'>data</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>component</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>version</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>HERE version</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>status</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>ref count</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>pass</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>warning</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>error</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>update time</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>here schedule</td>" +
    "<td style='background:#F0F8FF;font-weight:900'>detail</td></tr>";
	var datas = [];
	var data_rowspans = [];

    for (var i in components) {
        cygnus_components = components[i]
        for (var j in cygnus_components) {
            comp = cygnus_components[j];
	        html += '<tr>';
	        if (j == 0) {
	            html += '<td rowspan="' + cygnus_components.length + '">' + i + '</td>';
	        }
	        html += '<td>' + comp.name + '</td>';
	        var status_background_color = "#FFFFFF";
	        if (comp.status == "warning") {
	            status_background_color = "#FFFF66";
	        }
	        else if(comp.status == "error") {
	            status_background_color = "#FF2222";
	        }
	        else if(comp.status == "not ready") {
	            status_background_color = "#AAAAAA";
	        }
	        html += '<td>' + (comp.version ? comp.version: '') + '</td>';
	        html += '<td>' + (comp.here_version ? comp.here_version: '') + '</td>';
	        html += '<td style="background-color:' + status_background_color + '">' + comp.status + '</td>';
	        html += '<td>' + (comp.ref_count ? comp.ref_count: '') + '</td>';
	        html += '<td>' + (comp.pass ? comp.pass : '') + '</td>';
	        html += '<td>' + (comp.warning ? comp.warning : '') + '</td>';
	        html += '<td>' + (comp.error ? comp.error : '') + '</td>';
	        html += '<td>' + (comp.update_time ? comp.update_time : '') + '</td>';
	        html += '<td>' + (comp.here_schedule ? comp.here_schedule : '') + '</td>';
	        if (comp.detail_link) {
	            html += '<td><a href="' + comp.detail_link + '">Report</a></td></tr>';
	        }
	        else {
	            html += '<td></td></tr>';
	        }
	    }
    }
    return html;
}

$(function(){
    $.getJSON("main_result.json", function(json) {
        $("#table_result").html(get_components_info(json.cygnus_components));
        $("#report_title").text(json.region + " " + json.version + " raw data check report");
        $("#report_time").text(json.time);
        var doc_item = document.getElementById('documents');
        if (json.version.includes("Q")) {
            doc_item.href = "http://d-tempo-01.telenav.com/docs/HERE/" + json.version;
        } else {
            doc_item.style = "display:none";
        }
    });
});

</script>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <style type="text/css">
        table
        {
            padding: 0;
            margin: 0;
            border-collapse: collapse;
        }
        td
        {
            border: 1px solid #009999;
            padding: 6px 6px 6px 12px;
            color: #4f6b72;
            text-align: left;
        }
        .content {
         flex: 1;
        }
        body
        {
         min-height: 100%;
         display: flex;
         flex-direction: column;
        }
    </style>
</head>
<body>
<div class="content">
    <center>
        <hr/>
        <h1 id="report_title"></h1>
        <h5><label id="report_time"/></h5>
        <table id="table_result" width="90%">
        </table>
    </center>
</div>
</body>
</html>
